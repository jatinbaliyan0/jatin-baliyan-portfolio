<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Modern Calendar | Jatin Baliyan</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calendar">

    <div class="header">
        <button id="prev">❮</button>

        <h2 id="monthYear"></h2>

        <button id="next">❯</button>
    </div>

    <div class="weekdays">
        <div>Sun</div>
        <div>Mon</div>
        <div>Tue</div>
        <div>Wed</div>
        <div>Thu</div>
        <div>Fri</div>
        <div>Sat</div>
    </div>

    <div id="days" class="days"></div>

</div>

<script src="script.js"></script>

</body>
</html>
